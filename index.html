<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>English ↔ Hungarian Live Translator</title>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.2/babel.min.js"></script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
      min-height: 100vh;
      background: linear-gradient(135deg, #1e1b4b 0%, #312e81 40%, #4c1d95 100%);
      display: flex; align-items: center; justify-content: center; padding: 1rem;
    }
    @keyframes ping { 75%, 100% { transform: scale(2); opacity: 0; } }
    @keyframes spin { to { transform: rotate(360deg); } }
    .ping { animation: ping 1.2s cubic-bezier(0,0,0.2,1) infinite; }
    .spin { animation: spin 0.8s linear infinite; }
  </style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef, useCallback, useEffect } = React;
const LANG = {
  en: { label: "English", bcp: "en-US", flag: "🇬🇧", mm: "en" },
  hu: { label: "Magyar",  bcp: "hu-HU", flag: "🇭🇺", mm: "hu" },
};
function MicIcon({ active }) {
  const col = active ? "#ffffff" : "#c4b5fd";
  return (<svg viewBox="0 0 24 24" fill="none" width="44" height="44"><rect x="9" y="2" width="6" height="12" rx="3" fill={col}/><path d="M5 11a7 7 0 0014 0" stroke={col} strokeWidth="2" strokeLinecap="round" fill="none"/><line x1="12" y1="18" x2="12" y2="22" stroke={col} strokeWidth="2" strokeLinecap="round"/><line x1="8" y1="22" x2="16" y2="22" stroke={col} strokeWidth="2" strokeLinecap="round"/></svg>);
}
function SpeakerIcon({ active }) {
  const col = active ? "#7c3aed" : "#a78bfa";
  return (<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M11 5L6 9H2v6h4l5 4V5z" fill={col}/><path d="M15.54 8.46a5 5 0 010 7.07" stroke={col} strokeWidth="2" strokeLinecap="round"/><path d="M19.07 4.93a10 10 0 010 14.14" stroke={col} strokeWidth="2" strokeLinecap="round"/></svg>);
}
function SwapIcon() {
  return (<svg viewBox="0 0 24 24" fill="none" width="18" height="18"><path d="M7 16V4m0 0L3 8m4-4l4 4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/><path d="M17 8v12m0 0l4-4m-4 4l-4-4" stroke="white" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"/></svg>);
}
function Translator() {
  const [source, setSource] = useState("en");
  const [transcript, setTranscript] = useState("");
  const [translation, setTranslation] = useState("");
  const [isListening, setIsListening] = useState(false);
  const [isTranslating, setIsTranslating] = useState(false);
  const [isSpeaking, setIsSpeaking] = useState(false);
  const [error, setError] = useState("");
  const [supported, setSupported] = useState(true);
  const recognitionRef = useRef(null);
  const target = source === "en" ? "hu" : "en";
  useEffect(() => { if (!window.SpeechRecognition && !window.webkitSpeechRecognition) setSupported(false); }, []);
  const speakText = useCallback((text, bcp) => {
    const synth = window.speechSynthesis; synth.cancel();
    const utt = new SpeechSynthesisUtterance(text);
    utt.lang = bcp; utt.rate = 0.92;
    utt.onstart = () => setIsSpeaking(true);
    utt.onend = () => setIsSpeaking(false);
    utt.onerror = () => setIsSpeaking(false);
    synth.speak(utt);
  }, []);
  const doTranslate = useCallback(async (text, src, tgt) => {
    if (!text.trim()) return;
    setIsTranslating(true); setError("");
    try {
      const url = `https://api.mymemory.translated.net/get?q=${encodeURIComponent(text)}&langpair=${LANG[src].mm}|${LANG[tgt].mm}`;
      const res = await fetch(url);
      if (!res.ok) throw new Error();
      const data = await res.json();
      const out = data?.responseData?.translatedText;
      if (!out) throw new Error();
      setTranslation(out); speakText(out, LANG[tgt].bcp);
    } catch { setError("Translation failed — check your connection and try again."); }
    finally { setIsTranslating(false); }
  }, [speakText]);
  const startListening = useCallback(() => {
    const SR = window.SpeechRecognition || window.webkitSpeechRecognition;
    if (!SR) { setSupported(false); return; }
    setError(""); setTranscript(""); setTranslation(""); window.speechSynthesis.cancel();
    const r = new SR();
    r.lang = LANG[source].bcp; r.interimResults = true; r.continuous = false; r.maxAlternatives = 1;
    r.onresult = (e) => { const res = e.results[e.resultIndex]; const text = res[0].transcript; setTranscript(text); if (res.isFinal) doTranslate(text, source, target); };
    r.onerror = (e) => { if (e.error !== "aborted") setError(`Mic error: ${e.error}. Please allow microphone access.`); setIsListening(false); };
    r.onend = () => setIsListening(false);
    recognitionRef.current = r; r.start(); setIsListening(true);
  }, [source, target, doTranslate]);
  const stopListening = useCallback(() => { recognitionRef.current?.stop(); setIsListening(false); }, []);
  const handleSwap = () => { if (isListening) stopListening(); window.speechSynthesis.cancel(); setSource(p => p === "en" ? "hu" : "en"); setTranscript(""); setTranslation(""); setError(""); };
  const s = LANG[source], t = LANG[target];
  const card = { background:"rgba(255,255,255,0.06)", backdropFilter:"blur(16px)", border:"1px solid rgba(255,255,255,0.12)", borderRadius:28, overflow:"hidden", boxShadow:"0 24px 64px rgba(0,0,0,0.4)" };
  const box = (h) => ({ background:h?"rgba(109,40,217,0.25)":"rgba(0,0,0,0.2)", border:h?"1px solid rgba(139,92,246,0.3)":"none", borderRadius:16, padding:"14px 16px", minHeight:80, fontSize:18, lineHeight:1.55, color:"white", marginTop:8 });
  const micBtn = { width:84, height:84, borderRadius:"50%", background:isListening?"linear-gradient(135deg,#7c3aed,#6d28d9)":"linear-gradient(135deg,#4c1d95,#5b21b6)", border:"2px solid rgba(167,139,250,0.4)", boxShadow:isListening?"0 0 0 14px rgba(139,92,246,0.18),0 8px 32px rgba(109,40,217,0.5)":"0 8px 32px rgba(109,40,217,0.4)", cursor:"pointer", display:"flex", alignItems:"center", justifyContent:"center", position:"relative", transition:"all 0.2s" };
  const swapBtn = { display:"flex", alignItems:"center", gap:6, padding:"6px 14px", borderRadius:999, background:"rgba(139,92,246,0.35)", border:"1px solid rgba(139,92,246,0.55)", color:"white", cursor:"pointer", fontSize:13, fontWeight:600 };
  const replayBtn = { display:"flex", alignItems:"center", gap:4, padding:"4px 10px", borderRadius:999, background:"rgba(139,92,246,0.22)", border:"1px solid rgba(139,92,246,0.38)", color:"#c4b5fd", cursor:"pointer", fontSize:12, fontWeight:500 };
  const lbl = { fontSize:11, fontWeight:700, letterSpacing:"0.1em", textTransform:"uppercase", color:"rgba(196,181,253,0.65)" };
  return (
    <div style={{width:"100%",maxWidth:440}}>
      <div style={{textAlign:"center",marginBottom:32}}>
        <h1 style={{color:"white",fontSize:30,fontWeight:700,letterSpacing:"-0.5px"}}>Live Translator</h1>
        <p style={{color:"#a78bfa",marginTop:4,fontSize:14}}>Speak · Translate · Listen</p>
      </div>
      <div style={card}>
        <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",padding:"16px 24px",borderBottom:"1px solid rgba(255,255,255,0.1)"}}>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{fontSize:24}}>{s.flag}</span><span style={{color:"white",fontWeight:600}}>{s.label}</span></div>
          <button style={swapBtn} onClick={handleSwap}><SwapIcon/> Swap</button>
          <div style={{display:"flex",alignItems:"center",gap:8}}><span style={{color:"white",fontWeight:600}}>{t.label}</span><span style={{fontSize:24}}>{t.flag}</span></div>
        </div>
        <div style={{padding:"20px 24px 0"}}>
          <div style={lbl}>{s.flag} You said</div>
          <div style={box(false)}>{transcript?transcript:<span style={{color:"#8b5cf6",fontStyle:"italic",fontSize:15}}>{isListening?"Listening…":"Press the button below and speak"}</span>}</div>
          <div style={{display:"flex",alignItems:"center",justifyContent:"space-between",marginTop:18}}>
            <div style={lbl}>{t.flag} Translation</div>
            {translation&&(<button style={replayBtn} onClick={()=>speakText(translation,t.bcp)}><SpeakerIcon active={isSpeaking}/>{isSpeaking?"Playing…":"Replay"}</button>)}
          </div>
          <div style={box(true)}>{isTranslating?<span style={{color:"#a78bfa",display:"flex",alignItems:"center",gap:8}}><svg className="spin" viewBox="0 0 24 24" fill="none" width="16" height="16"><circle cx="12" cy="12" r="10" stroke="#a78bfa" strokeWidth="3" strokeOpacity="0.3"/><path d="M12 2a10 10 0 019.7 7.5" stroke="#a78bfa" strokeWidth="3" strokeLinecap="round"/></svg>Translating…</span>:translation?<span style={{fontWeight:500}}>{translation}</span>:<span style={{color:"#8b5cf6",fontStyle:"italic",fontSize:15}}>Translation will appear here</span>}</div>
        </div>
        {error&&(<div style={{margin:"12px 24px 0",padding:"10px 14px",borderRadius:12,fontSize:13,background:"rgba(220,38,38,0.18)",border:"1px solid rgba(248,113,113,0.3)",color:"#fca5a5"}}>{error}</div>)}
        <div style={{padding:"28px 0",display:"flex",flexDirection:"column",alignItems:"center",gap:12}}>
          {!supported?<p style={{color:"#a78bfa",textAlign:"center",fontSize:14,padding:"0 24px"}}>Speech recognition requires <strong>Chrome</strong> or <strong>Edge</strong>.</p>:
          <><div style={{position:"relative"}}>{isListening&&(<span className="ping" style={{position:"absolute",inset:0,borderRadius:"50%",background:"rgba(139,92,246,0.35)",display:"block"}}/>) }<button style={micBtn} onMouseDown={startListening} onMouseUp={stopListening} onTouchStart={startListening} onTouchEnd={stopListening} onClick={isListening?stopListening:startListening}><MicIcon active={isListening}/></button></div><p style={{color:"#a78bfa",fontSize:14}}>{isListening?"Release to stop":`Tap & speak in ${s.label}`}</p></>}
        </div>
      </div>
      <p style={{textAlign:"center",color:"rgba(139,92,246,0.5)",fontSize:11,marginTop:20}}>Powered by Web Speech API · MyMemory Translation</p>
    </div>
  );
}
ReactDOM.createRoot(document.getElementById("root")).render(<Translator/>);
</script>
</body>
</html>
